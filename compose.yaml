include:
  - infra.yaml

services:
  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: user-service
    env_file:
      - apps/user-service/.env
    ports:
      - ${USER_SERVICE_PORT}:3001
    environment:
      CONSUL_HOST: consul
      CONSUL_USER_SERVICE_HOST: user-service
      MONGO_USER_URI: mongodb://mongo-user:${MONGO_USER_PORT}/${MONGO_USER_DB}
    networks:
      - ms-net
    restart: unless-stopped
    healthcheck:
      test: [
        'CMD',
        'node',
        '-e',
        'fetch("http://localhost:3001/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
      ]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      consul:
        condition: service_healthy
      mongo-user:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: 0.75
          memory: 768M
        reservations:
          cpus: 0.25
          memory: 256M

networks:
  ms-net:
    name: ms-net
